apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: craft
  namespace: craft
  labels:
    app.kubernetes.io/part-of: paytm-craft
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.craft.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: craft-api
                port:
                  number: 4000
    - host: sync.craft.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: craft-realtime
                port:
                  number: 4001
