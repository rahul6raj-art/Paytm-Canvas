apiVersion: apps/v1
kind: Deployment
metadata:
  name: craft-realtime
  namespace: craft
  labels:
    app: craft-realtime
    app.kubernetes.io/part-of: paytm-craft
spec:
  replicas: 2
  selector:
    matchLabels:
      app: craft-realtime
  template:
    metadata:
      labels:
        app: craft-realtime
    spec:
      containers:
        - name: craft-realtime
          image: REGISTRY/craft-realtime:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4001
          envFrom:
            - configMapRef:
                name: craft-backend
            - secretRef:
                name: craft-backend
          env:
            - name: CRAFT_SYNC_PORT
              value: "4001"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
