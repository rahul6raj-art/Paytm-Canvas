# Example reverse proxy — TLS termination + WebSocket upgrade for craft-realtime.
# Replace hostnames and certificate paths for your environment.

upstream craft_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

upstream craft_realtime {
    server 127.0.0.1:4001;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name api.craft.example.com;

    ssl_certificate     /etc/ssl/certs/craft.crt;
    ssl_certificate_key /etc/ssl/private/craft.key;

    location / {
        proxy_pass http://craft_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name sync.craft.example.com;

    ssl_certificate     /etc/ssl/certs/craft.crt;
    ssl_certificate_key /etc/ssl/private/craft.key;

    location / {
        proxy_pass http://craft_realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
